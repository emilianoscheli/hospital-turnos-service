server.port=8083
spring.application.name=turnos-service

# Conexión a Base de Datos (Ajustá usuario y password si es distinto)
spring.datasource.url=jdbc:postgresql://localhost:5432/hospital_turnos_db
spring.datasource.username=postgres
spring.datasource.password=admin123
# Configuración Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Regla estricta: Respetar mayúsculas en las tablas/columnas
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

